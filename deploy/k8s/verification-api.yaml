apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${VERIFICATION_DEPLOYMENT_NAME}
  namespace: ${NAMESPACE}
  labels:
    app: ${VERIFICATION_APP_LABEL}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${VERIFICATION_APP_LABEL}
  template:
    metadata:
      labels:
        app: ${VERIFICATION_APP_LABEL}
    spec:
      containers:
        - name: verification-api
          image: ${VERIFICATION_API_IMAGE}
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "7071"
            - name: SEEDCORE_VERIFY_BIN
              value: "/usr/local/bin/seedcore-verify"
            - name: SEEDCORE_RUNTIME_API_BASE
              value: "${VERIFICATION_RUNTIME_API_BASE}"
          ports:
            - containerPort: 7071
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 7071
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 7071
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ${VERIFICATION_SERVICE_NAME}
  namespace: ${NAMESPACE}
  labels:
    app: ${VERIFICATION_APP_LABEL}
spec:
  selector:
    app: ${VERIFICATION_APP_LABEL}
  ports:
    - name: http
      port: 7071
      targetPort: 7071
