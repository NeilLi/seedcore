apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-to-ray-serve
  namespace: seedcore-dev
spec:
  podSelector:
    matchLabels:
      ray.io/is-ray-node: "yes"
      ray.io/group: headgroup
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: seedcore-api
    ports:
    - protocol: TCP
      port: 8000 # For HTTP
  # Allow in-namespace control-plane and bootstrap traffic required by Ray/KubeRay.
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 6379   # GCS
    - protocol: TCP
      port: 8265   # Dashboard / control-plane checks
    - protocol: TCP
      port: 10001  # Ray Client
    - protocol: TCP
      port: 8000   # Serve
  # KubeRay operator (different namespace) needs dashboard access to manage Serve apps.
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kuberay-system
      podSelector:
        matchLabels:
          app.kubernetes.io/name: kuberay-operator
    ports:
    - protocol: TCP
      port: 8265
