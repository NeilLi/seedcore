apiVersion: apps/v1
kind: Deployment
metadata:
  name: seedcore-ray-head
  namespace: seedcore-dev
  labels:
    component: ray-head
spec:
  replicas: 1
  selector:
    matchLabels:
      component: ray-head
  template:
    metadata:
      labels:
        component: ray-head
    spec:
      containers:
        - name: ray-head
          image: seedcore:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-c"]
          # Start Ray head and deploy Serve applications
          args:
            - |
              # Start Ray head in background
              ray start --head --port=6379 --dashboard-host=0.0.0.0 --dashboard-port=8265 --ray-client-server-port=10001 --num-cpus=6 --block &
              RAY_PID=$!
              
              # Wait for Ray to be fully ready
              echo "⏳ Waiting for Ray to be ready..."
              for i in {1..30}; do
                if ray status >/dev/null 2>&1; then
                  echo "✅ Ray is ready"
                  break
                fi
                sleep 1
              done
              
              # Deploy Serve applications from config file
              echo "🚀 Deploying Serve applications..."
              # Note: CLI may fail if config has local paths in runtime_env, so we use Python API
              # which can handle local paths since /app is already mounted in the container
              
              # Fallback to Python API (handles local paths in runtime_env)
              python3 << 'PYTHON_EOF'
              import ray
              from ray import serve
              import yaml
              import sys
              import os
              
              try:
                  # Initialize Ray connection (already running)
                  ray.init(address='auto', namespace='seedcore-dev', ignore_reinit_error=True)
                  
                  # Start Serve with HTTP options
                  serve.start(http_options={'host': '0.0.0.0', 'port': 8000})
                  
                  # Load config file
                  config_path = '/app/config/ray-serve.yaml'
                  if not os.path.exists(config_path):
                      print(f'⚠️  Config file not found: {config_path}', file=sys.stderr)
                      print('   Ray head is running, but Serve config not found', file=sys.stderr)
                      sys.exit(0)  # Non-fatal for mini setup
                  
                  with open(config_path, 'r') as f:
                      config = yaml.safe_load(f)
                  
                  # Deploy each application from config
                  # Note: runtime_env.working_dir is ignored since /app is already mounted
                  deployed_count = 0
                  
                  if 'applications' in config:
                      for app_config in config['applications']:
                          app_name = app_config.get('name', 'default')
                          import_path = app_config.get('import_path')
                          # NOTE: Ray 2.5x+ keeps route_prefix at serve.run() or
                          # Serve app config, not on @serve.deployment.
                          route_prefix = app_config.get('route_prefix', '/')
                          app_args = app_config.get('args') or {}
                          
                          if import_path:
                              try:
                                  # Import and build the application
                                  module_path, func_name = import_path.rsplit(':', 1)
                                  module = __import__(module_path, fromlist=[func_name])
                                  build_func = getattr(module, func_name)
                                  try:
                                      app = build_func(app_args)
                                  except TypeError:
                                      app = build_func()
                                  
                                  # Deploy application synchronously so we don't lose
                                  # slower deployments when the bootstrap script exits.
                                  serve.run(app, name=app_name, route_prefix=route_prefix)
                                  
                                  deployed_count += 1
                                  print(f'✅ Deployed: {app_name} at {route_prefix}')
                              except Exception as app_error:
                                  print(f'⚠️  Failed to deploy {app_name}: {app_error}', file=sys.stderr)
                                  import traceback
                                  traceback.print_exc()
                  
                  if deployed_count > 0:
                      # Give deployments a moment to initialize
                      import time
                      time.sleep(3)
                      print(f'✅ Successfully deployed {deployed_count} Serve application(s)')
                      print('   Serve is running on http://0.0.0.0:8000')
                      print('   Note: Some startup warnings are normal and can be ignored')
                  else:
                      print('⚠️  No applications were deployed - Ray head is running without Serve', file=sys.stderr)
              except Exception as e:
                  print(f'⚠️  Warning: Could not deploy Serve: {e}', file=sys.stderr)
                  print('   Ray head is still running, but Serve deployment had errors', file=sys.stderr)
                  import traceback
                  traceback.print_exc()
                  # Don't exit - allow Ray to keep running
              PYTHON_EOF
              
              # Keep the container running
              wait $RAY_PID
          envFrom:
            - secretRef: { name: seedcore-env-secret }
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SERVE_SERVICE
              value: "stable"
            - name: ENABLE_ML_SERVICE
              value: "false"
            - name: DGL_GRAPHBOLT_SKIP
              value: "1"
            - name: RAY_OVERRIDE_RESOURCES
              value: '{"head_node": 1}'
            - name: XGB_STORAGE_PATH
              value: "/app/data/models"
          ports:
            - name: gcs
              containerPort: 6379
            - name: dashboard
              containerPort: 8265
            - name: client
              containerPort: 10001
            - name: serve
              containerPort: 8000
            - name: metrics
              containerPort: 8080
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "6"
              memory: "8Gi"
          volumeMounts:
            - name: ml-model-storage
              mountPath: /app/data
            - name: project-src
              mountPath: /app
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: ml-model-storage
          persistentVolumeClaim:
            claimName: xgb-pvc
        - name: project-src
          hostPath:
            path: /project # UPDATE THIS to your actual Mac path
            type: Directory
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: seedcore-head-svc
  namespace: seedcore-dev
spec:
  selector:
    component: ray-head
  ports:
    - name: dashboard
      protocol: TCP
      port: 8265
      targetPort: 8265
    - name: serve
      protocol: TCP
      port: 8000
      targetPort: 8000
    - name: client
      protocol: TCP
      port: 10001
      targetPort: 10001
  type: ClusterIP
