apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: seedcore
spec:
  headGroupSpec:
    serviceType: ClusterIP
    rayStartParams:
      dashboard-host: "0.0.0.0"
      # Keep defaults for other ports; metrics is controlled via env below
    template:
      spec:
        containers:
        - name: ray-head
          image: seedcore-serve:latest
          envFrom:
            - configMapRef:
                name: seedcore-env
          # OPTIONAL: force "auto" explicitly if you prefer
          env:
            - name: RAY_ADDRESS
              value: "auto"
            - name: SEEDCORE_VERIFY_BIN
              value: "/usr/local/bin/seedcore-verify"
          ports:
          - name: client
            containerPort: 10001
          - name: dashboard
            containerPort: 8265
          - name: gcs-server
            containerPort: 6379
          - name: metrics
            containerPort: 8081
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "1",    memory: "2Gi" }
  workerGroupSpecs:
  - groupName: small
    replicas: 2
    template:
      spec:
        containers:
        - name: ray-worker
          image: rayproject/ray:2.53.0-py312
          envFrom:
            - configMapRef:
                name: seedcore-env
          env:
            - name: SEEDCORE_VERIFY_BIN
              value: "/usr/local/bin/seedcore-verify"
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "1",    memory: "2Gi" }
