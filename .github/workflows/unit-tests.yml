name: unit-tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        env:
          PYTHONWARNINGS: "ignore::DeprecationWarning"
        run: |
          pytest -q tests

      - name: Run authz parity matrix
        env:
          PYTHONWARNINGS: "ignore::DeprecationWarning"
        run: |
          pytest -q tests/test_authz_parity_service.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ts/package-lock.json

      - name: TypeScript — typecheck and Q2 verification contracts
        run: |
          cd ts
          npm ci
          npm run typecheck
          npm test
