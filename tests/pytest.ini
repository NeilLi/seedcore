[pytest]
markers =
    rct_degraded_edge: Restricted Custody Transfer degraded-edge / adversarial drill slice (Q2).
    rct_commerce_drill: Commerce-slice drills (gateway contract) binding evidence to product_ref / workflow join keys.
    agent_self_regulation_drill: Assistant self-regulation drill covering gated action manifest, MCP preflight, and SDK shadow/enforce evidence.
    kafka_integration: Requires local Kafka broker + confluent-kafka client.
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
